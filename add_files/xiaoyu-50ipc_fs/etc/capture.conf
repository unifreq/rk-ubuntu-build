#ENCODER_GOP="60"

# 1920x1080 @60fps H.264 (高帧率运动场景)
#ENCODER_CODEC="h264_rkmpp"
#ENCODER_BITRATE="12M"
#ENCODER_GOP="120"

# 1920x1080 @60fps HEVC (高帧率 + 低带宽)
#ENCODER_CODEC="hevc_rkmpp"
