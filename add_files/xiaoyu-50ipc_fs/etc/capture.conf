# ==============================================================================
# Rockchip RV1126B 摄像头采集与显示配置文件
# ==============================================================================
# 本文件中的所有选项均可在命令行中覆盖:
#   capture.pl --display-width=1920 --display-height=1080 --encoder-bitrate=12M
#
# 未设置的选项使用 capture.pl 内置默认值。
# 取消注释即可启用对应配置组合。

# ==============================================================================
# --- 1. 功能开关 ---
# ==============================================================================

DISPLAY_ENABLE="true"
STREAM_ENABLE="true"

# ==============================================================================
# --- 2. 3A 算法服务管理 ---
# ==============================================================================

# 启动前重启 3A 算法服务。设为 true 会在启动管线前执行:
#   systemctl restart rkaiq_3A.service
# 对于首次刷机启动等高负载场景，重启 3A 可确保算法线程正确创建
RESTART_3A="false"

# 等待 3A 算法就绪后再启动管线
# 通过检测 TCP 端口 4894 (3A server 监听端口) 判断就绪状态
# 最长等待 30 秒，超时将强制继续
WAIT_3A="true"

# ==============================================================================
# --- 3. 摄像头设备节点 ---
# ==============================================================================

# FFMPEG CAM: 用于rtsp推流，通常采用rkisp_mainpath设备
# 可使用 "media-ctl -d /dev/mediaX -e "rkisp_mainpath" 查到
FFMPEG_CAM_DEV="/dev/video24"

# GST CAM: 用于本地显示，通常采用rkisp_selfpath设备，或rkvpss_scale设备
# 可使用 "media-ctl -d /dev/mediaX -e "rkisp_selfpath" 查到
GST_CAM_DEV="/dev/video25"

# ==============================================================================
# --- 4. 本地显示屏参数 ---
# ==============================================================================
# connector-id 的优先级比 connector-name 高
# 强制指定显示设备(注释后为自动检测):
DISPLAY_CONNECTOR_ID=96
DISPLAY_CONNECTOR_NAME="DSI-1"

DISPLAY_WIDTH="480"
DISPLAY_HEIGHT="800"
DISPLAY_ROTATE="270"
FORCE_MODESETTING="false"

# ==============================================================================
# --- 5. 视频采集参数 ---
# ==============================================================================
# 这些参数会被摄像头探测结果覆盖:
# 如果 ISP 最大分辨率小于 CAPTURE_WIDTH, 会自动降级.

CAPTURE_WIDTH="2560"
CAPTURE_HEIGHT="1440"
CAPTURE_FPS="60"
RTSP_URL="rtsp://127.0.0.1:8554/live/0"

# ==============================================================================
# --- 6. 视频编码参数 ---
# ==============================================================================
# 支持的编码器: h264_rkmpp (默认) / hevc_rkmpp
# 编码器会自动根据类型选择最优参数:
#   h264_rkmpp: -level 4.2 -profile high -coder cabac -8x8dct 1
#   hevc_rkmpp: -level 5.1 -tier main
# 通用参数: -rc_mode VBR -b:v BITRATE -maxrate BITRATE -bufsize BITRATE*2 -g GOP
#
# ENCODER_EXTRA 可用于追加额外参数(不常用, 高级调参用):
#   -qp_init 26 -qp_max 40 -qp_min 10   (QP 范围控制, 值越小画质越好码率越大)
#   -intra_refresh 1                      (去块刷新, 低延迟场景)
#   注意: 此参数会追加到自动生成参数的末尾, 可覆盖前述参数

ENCODER_CODEC="h264_rkmpp"

# ENCODER_BITRATE: 目标码率, 格式为数字+单位(K/M)
#   GOP 设为 "auto" 时自动计算为 fps*2
#   当编码器为 hevc_rkmpp 时, 码率可设为 h264 的 60%~70% 即可获得相同画质

ENCODER_BITRATE="8M"
ENCODER_GOP="auto"
ENCODER_EXTRA=""

# -----------------------------------------------------------------------
# 常用编码参数配置组合 (按需取消注释)
# -----------------------------------------------------------------------

