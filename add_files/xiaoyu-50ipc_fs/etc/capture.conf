#ENCODER_BITRATE="16M"
#ENCODER_GOP="120"

# 2560x1440 @60fps HEVC
#ENCODER_CODEC="hevc_rkmpp"
#ENCODER_BITRATE="10M"
#ENCODER_GOP="120"

# ========== 4K (3840x2160) ==========
# 适用: 超高清监控、视频制作 (需确认摄像头支持4K)

# 3840x2160 @30fps H.264
#ENCODER_CODEC="h264_rkmpp"
#ENCODER_BITRATE="24M"
#ENCODER_GOP="60"

# 3840x2160 @30fps HEVC
#ENCODER_CODEC="hevc_rkmpp"
#ENCODER_BITRATE="16M"
#ENCODER_GOP="60"

# ========== 竖屏摄像头 (480x800 / 360x480) ==========
# 适用: 门铃、门禁、婴儿监控

# 480x800 @30fps H.264 (DSI-1 竖屏摄像头)
#ENCODER_CODEC="h264_rkmpp"
#ENCODER_BITRATE="2M"
#ENCODER_GOP="60"

# 360x480 @30fps H.264
#ENCODER_CODEC="h264_rkmpp"
#ENCODER_BITRATE="1M"
#ENCODER_GOP="60"

# ========== 高级调参示例 ==========
# 以下示例使用 ENCODER_EXTRA 的 QP 控制来精细调节画质:
# QP 越小画质越好, 码率越高; QP 越大画质越差, 码率越低

# H.264 最佳画质 (低 QP, 高码率)
#ENCODER_CODEC="h264_rkmpp"
#ENCODER_BITRATE="16M"
#ENCODER_GOP="60"
#ENCODER_EXTRA="-qp_init 22 -qp_max 35 -qp_min 10"

# HEVC 均衡画质 (宽 QP 范围, 自适应调节)
#ENCODER_CODEC="hevc_rkmpp"
#ENCODER_BITRATE="8M"
#ENCODER_GOP="60"
#ENCODER_EXTRA="-qp_init 26 -qp_max 42 -qp_min 12"

