# ==============================================================================
# Rockchip RV1126B 流媒体与本地显示配置文件
# ==============================================================================

# --- 1. 硬件节点配置 ---
ISP_DEV="/dev/video24"
VPSS_DEV="/dev/video42"

# --- 2. 本地显示屏参数 (GStreamer / kmssink) ---
# 💡 请直接填写你屏幕在未旋转前的最终真实物理分辨率 (宽和高)
# 如果是当前 480x800 的竖屏，直接写 480 和 800
DISPLAY_WIDTH="480"
DISPLAY_HEIGHT="800"

# 屏幕实际所需的顺时针旋转角度。
# 可选值:  0 (横屏直通),
#         90 (顺时针90度),
#        180 (倒转180度),
#        270 (顺时针270度，或逆时针90度)
# 当前 480x800 的竖屏请直接填写 "270" (对应 GStreamer 的 90l)
DISPLAY_ROTATE="270"

# 对于外接显示器环境(hdmi或dp), 可能需要改成 true
FORCE_MODESETTING="false"

# --- 3. 视频采集与推流参数 (FFmpeg / rkmpp) ---
CAPTURE_WIDTH="2560"
CAPTURE_HEIGHT="1440"
CAPTURE_FPS="60"

# mpeg编码方式：可选 h264_rkmpp hevc_rkmpp
ENCODER_CODEC="h264_rkmpp"

# 本地mediamtx服务
RTSP_URL="rtsp://127.0.0.1:8554/live/0"
