#ENCODER_CODEC="h264_rkmpp"
#ENCODER_BITRATE="2M"
#ENCODER_GOP="50"
# 对应: 1280x720@25fps 标清推流

# ========== HD 高清 (1920x1080) ==========
# 适用: 直播、监控、视频会议

# 1920x1080 @30fps H.264 (推荐, 平衡画质与带宽)
