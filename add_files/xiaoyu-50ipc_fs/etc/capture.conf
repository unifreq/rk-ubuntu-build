#ENCODER_GOP="120"

# ========== 2K (2560x1440) ==========
# 适用: 高清监控、直播推流

# 2560x1440 @30fps H.264
#ENCODER_CODEC="h264_rkmpp"
#ENCODER_BITRATE="10M"
#ENCODER_GOP="60"

# 2560x1440 @30fps HEVC
#ENCODER_CODEC="hevc_rkmpp"
#ENCODER_BITRATE="6M"
#ENCODER_GOP="60"

# 2560x1440 @60fps H.264 (当前默认, 8M->16M提升画质)
