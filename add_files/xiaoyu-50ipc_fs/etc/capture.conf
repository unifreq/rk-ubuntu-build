# 1920x1080   60fps  12M        8M       120    高帧率高清
# 2560x1440   30fps  10M        6M        60    2K 监控
# 2560x1440   60fps  16M       10M       120    2K 高帧率
# 3840x2160   30fps  24M       16M        60    4K 超高清
# 480x800     30fps   2M        1.2M      60    竖屏 DSI
